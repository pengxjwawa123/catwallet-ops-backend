services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ops}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ops}
      POSTGRES_DB: ${POSTGRES_DB:-catwallet_ops}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ops_net
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-ops} -d ${POSTGRES_DB:-catwallet_ops}']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - ops_net
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # 容器内通过服务名互联，覆盖 .env 里的 localhost
      DATABASE_URL: postgresql://${POSTGRES_USER:-ops}:${POSTGRES_PASSWORD:-ops}@postgres:5432/${POSTGRES_DB:-catwallet_ops}?schema=public
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-change-me-to-a-long-random-secret}
      JWT_ACCESS_EXPIRY: ${JWT_ACCESS_EXPIRY:-15m}
      JWT_REFRESH_EXPIRY: ${JWT_REFRESH_EXPIRY:-7d}
      PORT: ${PORT:-3000}
      # 容器内固定 production:走 JSON 日志,不依赖 dev-only 的 pino-pretty
      NODE_ENV: production
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
      CATWALLET_API_BASE_URL: ${CATWALLET_API_BASE_URL:-https://api.catwallet.ai}
      CATWALLET_API_TOKEN: ${CATWALLET_API_TOKEN:-}
      SENTRY_DSN: ${SENTRY_DSN:-}
    ports:
      - '${APP_PORT:-3001}:3000'
    networks:
      - ops_net

  admin-web:
    build:
      context: ./apps/admin-web
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api
    restart: unless-stopped
    depends_on:
      - app
    ports:
      # 浏览器访问 http://<host>:${WEB_PORT}/ 打开管理界面;/api 反代到 app
      - '${WEB_PORT:-8080}:80'
    networks:
      - ops_net

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  ops_net:
    driver: bridge
