server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # 允许大文件上传(如 App 更新包 .apk)。后端 multer 限制 500MB,这里留余量。
  # 注意:若前面还有一层宿主机 nginx 做 TLS,那一层也必须设置同样的值,
  # 否则请求会在到达本容器前就被外层以 413 拒绝。
  client_max_body_size 600m;

  # SPA 路由:找不到文件回退 index.html
  location / {
    try_files $uri $uri/ /index.html;
  }

  # 反代后端:/api/auth/login → http://app:3000/auth/login
  location /api/ {
    proxy_pass http://app:3000/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # 大文件(App 更新包)上传慢,默认 60s 会中途断连。
    # 后端上游超时 120s、前端 130s,这里放到 300s 兜底,并关闭请求体缓冲
    # 以便边收边转发大文件。
    proxy_request_buffering off;
    proxy_connect_timeout 60s;
    proxy_send_timeout 300s;
    proxy_read_timeout 300s;
  }

  # 静态资源缓存
  location /assets/ {
    expires 7d;
    add_header Cache-Control "public, immutable";
  }
}
